<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130" role="img" aria-label="代購流程：日本下單到店取貨">
  <!-- 日本（鳥居）-->
  <g transform="translate(44,40)">
    <path d="M-30 0 h60 M-24 8 h48" stroke="#FF6A4D" stroke-width="7" stroke-linecap="round"/>
    <path d="M-20 8 v40 M20 8 v40" stroke="#262329" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="74" text-anchor="middle" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="14" fill="#262329">日本下單</text>
  </g>
  <path d="M84 44 h36" stroke="#262329" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 6"/><path d="M120 44 l-9 -5 v10z" fill="#262329"/>
  <!-- 飛機 -->
  <g transform="translate(165,42)">
    <path d="M-26 4 l44 -10 -6 12 18 2 -16 8 -6 12 -8 -14z" fill="#5BB3CE" stroke="#262329" stroke-width="4" stroke-linejoin="round"/>
    <text x="0" y="72" text-anchor="middle" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="14" fill="#262329">空運集貨</text>
  </g>
  <path d="M210 44 h36" stroke="#262329" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 6"/><path d="M246 44 l-9 -5 v10z" fill="#262329"/>
  <!-- 包裹 -->
  <g transform="translate(290,40)">
    <rect x="-26" y="-18" width="52" height="40" rx="5" fill="#FFC24B" stroke="#262329" stroke-width="4"/>
    <path d="M-26 -4 h52 M0 -18 v40" stroke="#262329" stroke-width="4"/>
    <text x="0" y="76" text-anchor="middle" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="14" fill="#262329">到店分貨</text>
  </g>
  <path d="M332 44 h36" stroke="#262329" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 6"/><path d="M368 44 l-9 -5 v10z" fill="#262329"/>
  <!-- 店/取貨 -->
  <g transform="translate(412,40)">
    <path d="M-26 6 v-18 l26 -16 26 16 v18z" fill="#FF6A4D" stroke="#262329" stroke-width="4" stroke-linejoin="round"/>
    <rect x="-9" y="-10" width="18" height="16" rx="3" fill="#FBF6EE" stroke="#262329" stroke-width="3"/>
    <text x="0" y="76" text-anchor="middle" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="14" fill="#262329">現場驗取</text>
  </g>
</svg>
