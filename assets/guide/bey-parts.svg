<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" role="img" aria-label="戰鬥陀螺三大部位：刀刃、軌道環、軸尖">
  <!-- 刀刃 Blade -->
  <g transform="translate(120,52)">
    <ellipse cx="0" cy="0" rx="72" ry="26" fill="#FF6A4D" stroke="#262329" stroke-width="5"/>
    <path d="M-72 0 l-12 -8 M72 0 l12 -8 M-40 -18 l-6 -12 M40 -18 l6 -12" stroke="#262329" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="0" cy="-2" rx="30" ry="11" fill="#FBF6EE" stroke="#262329" stroke-width="3"/>
    <text x="128" y="4" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="18" fill="#262329">刀刃 Blade</text>
    <text x="128" y="26" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#6b6660">攻擊力・重量</text>
  </g>
  <!-- 軌道環 Ratchet -->
  <g transform="translate(120,140)">
    <ellipse cx="0" cy="0" rx="50" ry="18" fill="#5BB3CE" stroke="#262329" stroke-width="5"/>
    <path d="M-50 0 v8 a50 18 0 0 0 100 0 v-8" fill="#3F8AA3" stroke="#262329" stroke-width="5"/>
    <text x="128" y="4" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="18" fill="#262329">軌道環 Ratchet</text>
    <text x="128" y="26" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#6b6660">高度・重心</text>
  </g>
  <!-- 軸尖 Bit -->
  <g transform="translate(120,210)">
    <ellipse cx="0" cy="0" rx="30" ry="11" fill="#FFC24B" stroke="#262329" stroke-width="5"/>
    <path d="M-22 4 q22 40 44 0" fill="#FFC24B" stroke="#262329" stroke-width="5"/>
    <text x="128" y="4" font-family="'Noto Sans TC',sans-serif" font-weight="700" font-size="18" fill="#262329">軸尖 Bit</text>
    <text x="128" y="26" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#6b6660">取向・耐久</text>
  </g>
</svg>
