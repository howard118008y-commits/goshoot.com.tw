<style>
.shopbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin:0 0 22px}
.shopbar .meta{color:var(--muted);font-size:14px}
.shopbar .meta b{color:var(--ink);font-family:var(--display)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.pcard{position:relative;background:var(--paper);border:1px solid var(--line);
  border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
.pcard:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(38,35,41,.08)}
.pcard .imgwrap{aspect-ratio:1;background:#efeae1;overflow:hidden}
.pcard img{width:100%;height:100%;object-fit:cover;display:block}
.pcard .rank{position:absolute;top:10px;left:10px;background:var(--ink);color:var(--cream);
  font-family:var(--display);font-weight:700;font-size:13px;padding:3px 10px;border-radius:999px}
.pcard .rank.top{background:var(--coral)}
.pcard .body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.pcard .name{font-size:14px;line-height:1.5;color:#2f2b27;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.pcard .price{font-family:var(--display);font-weight:600;font-size:18px;color:var(--coral-deep)}
.pcard .buy{margin-top:auto;display:block;text-align:center;background:var(--coral);
  color:var(--cream);font-family:var(--display);font-size:14px;padding:9px;border-radius:10px}
.pcard .buy:hover{filter:brightness(1.05)}
.state{padding:50px 0;text-align:center;color:var(--muted)}
.shopnote{margin-top:30px;background:var(--paper);border-left:4px solid var(--sky);
  border-radius:0 14px 14px 0;padding:16px 20px;color:var(--muted);font-size:14px}
</style>
</head>

    <span class="eyebrow">每月熱銷 Top 100</span>

<script>
(async function(){
  var grid=document.getElementById('grid');
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  try{
    var res=await fetch('products.json',{cache:'no-store'});
    if(!res.ok) throw new Error('no data');
    var data=await res.json();
    var list=(data.products||[]);
    document.getElementById('updated').textContent=data.updated||'—';
    document.getElementById('count').textContent=list.length||'—';
    if(!list.length){ grid.innerHTML='<div class="state">目前尚無商品資料。</div>'; return; }
    grid.innerHTML=list.map(function(p,i){
      var rank=(p.rank!=null?p.rank:(i+1));
      var topCls=rank<=3?' top':'';
      var img=p.image?('<img src="'+esc(p.image)+'" alt="'+esc(p.name)+'" loading="lazy" onerror="this.remove()">'):'';
      var url=p.url&&p.url!=='#'?esc(p.url):'#';
      return '<div class="pcard">'
        +'<span class="rank'+topCls+'">#'+esc(rank)+'</span>'
        +'<div class="imgwrap">'+img+'</div>'
        +'<div class="body">'
        +'<div class="name">'+esc(p.name||'商品')+'</div>'
        +'<div class="price">'+esc(p.price||'')+'</div>'
        +'<a class="buy" href="'+url+'" target="_blank" rel="noopener">在蝦皮購買</a>'
        +'</div></div>';
    }).join('');
  }catch(e){
    grid.innerHTML='<div class="state">商品資料還沒準備好。<br>請先更新 products.json，或<a href="#" data-shopee style="color:var(--coral-deep)">直接前往蝦皮賣場</a>。</div>';
  }
})();
</script>
<script src="assets/site.js" defer></script>
